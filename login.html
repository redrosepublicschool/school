<!DOCTYPE html>
<html>
<head>
  <title>Student Portal</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background: #fff3f3;
    }

    /* LOGIN */
    .login-box{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(120deg,#ff416c,#ff4b2b);
    }

    .card{
      background:white;
      padding:30px;
      border-radius:12px;
      width:300px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border-radius:8px;
      border:1px solid #ddd;
      outline:none;
    }

    button{
      width:100%;
      padding:10px;
      background:#ff4b2b;
      border:none;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }

    /* DASHBOARD */
    .dashboard{
      display:none;
      padding:20px;
    }

    .topbar{
      background: linear-gradient(120deg,#ff416c,#ff4b2b);
      color:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:20px;
      text-align:center;
    }

    /* PROFILE CARD */
    .profile{
      background:white;
      padding:20px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      margin-bottom:20px;
    }

    .profile img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid #ff4b2b;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap:15px;
    }

    .box{
      background:white;
      padding:15px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      border-left:5px solid #ff4b2b;
    }

    .title{
      font-weight:bold;
      color:#ff4b2b;
      margin-bottom:5px;
    }

    #msg{
      margin-top:10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginPage">
  <div class="card">
    <h2>Student Login</h2>
    <input id="id" placeholder="Enter ID">
    <input id="pass" type="password" placeholder="Enter Password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="topbar">
    <h2>Student Dashboard</h2>
  </div>

  <!-- PROFILE -->
  <div class="profile" id="profileBox"></div>

  <!-- DETAILS -->
  <div class="grid" id="dataBox"></div>

</div>

<script>
function login(){

  let id = document.getElementById("id").value;
  let pass = document.getElementById("pass").value;

  fetch("https://sheetdb.io/api/v1/1ria83g3hcd1z")
  .then(res => res.json())
  .then(data => {

    let user = data.find(u => u.id == id && u.password == pass);

    if(user){

      document.getElementById("loginPage").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      // PROFILE SECTION
      document.getElementById("profileBox").innerHTML = `
        <img src="${user.photo || 'https://via.placeholder.com/120'}">
        <h3>${user.name}</h3>
        <p>ID: ${user.id}</p>
      `;

      // DETAILS SECTION
      document.getElementById("dataBox").innerHTML = `
        
        <div class="box">
          <div class="title">Father Name</div>
          ${user.father}
        </div>

        <div class="box">
          <div class="title">Mother Name</div>
          ${user.mother || "Not Available"}
        </div>
        
        <div class="box">
          <div class="title">Address</div>
          ${user.address}
        </div>
        
        <div class="box">
          <div class="title">Fee Status</div>
          ${user.fee}
        </div>

        <div class="box">
          <div class="title">Aapaar Id</div>
          ${user.aapaar}
        </div>

      `;

    } else {
      document.getElementById("msg").innerHTML =
      "<span style='color:red'>Invalid Login ❌</span>";
    }

  });
}
</script>

</body>
</html>
